# DEPRECATED — Superseded by config_f.yaml
# This file contains the INITIAL (uncalibrated) Config F parameters.
# The calibrated final parameters are in config_f.yaml.
# Retained for provenance only. Do NOT use for simulations.
#
# Original: Config F — RIG-gehaertete Konfiguration
# Erweiterung von Config E um:
#   7. Solidaritaets-Equity-Swap + Robotik-Infrastrukturgesellschaft (RIG)
#
# Kernmechanismus:
#   tau_high (12.25%) wird gesplittet:
#     - 8.00 pp -> Garantie-Pool (unwiderruflich solidarisch)
#     - 4.25 pp -> RIG-Infrastruktur-Zertifikate (stimmrechtslose Anteile)
#
#   RIG-Fonds:
#     - Investiert in reale Infrastruktur (Logistik, Energie, KI-Rechenzentren)
#     - Dekorrelierte Rendite: r_RIG = base_return + beta * (r_mkt - base_return)
#     - Dividenden: 50% -> Garantie-Pool (automatischer Stabilisator), 50% -> Zertifikatshalter
#
# Erwartete Effekte:
#   - Inflationsschutz durch Realwert-Anker
#   - Reduktion des Brain Drain (High-Earner erhalten Sachwert-Portfolio)
#   - Stabilisierung des Garantie-Pools in Stagflationsszenarien
#
# Risiken:
#   - Technologisches Beta (Physical AI Reife)
#   - Governance-Risiko (politische Vereinnahmung)
#   - Pool erhaelt nur 8 pp statt 12.25 pp direkte Beitraege

horizon_years: 100
age_start: 20
retire_age: 67
annuity_years: 20

# Bevoelkerungsanteile
low_share: 0.30
mid_share: 0.50
high_share: 0.20

# Einkommen bei Rentenalter (real, EUR/Jahr)
income_low_retire: 22000
income_mid_retire: 40000
high_income_factor: 1.8   # -> EUR 72.000 fuer High

# Beitragssaetze
tau_low: 0.12
tau_mid: 0.13
# tau_high wird durch RIG-Split ersetzt (rig_tau_insurance + rig_tau_equity = 0.1225)

# Garantieniveaus
guarantee_low: 0.85    # 85%
guarantee_mid: 0.60    # 60%

# Optimierer-Suchbereich (falls benoetigt)
tau_high_search:
  start: 0.01
  end: 0.25
  step: 0.0025

# Kohortengroesse
cohort_size_at_age_start: 831435

# --- Haertung 1: Mortalitaet (Destatis 2022/2024)
mortality:
  enabled: true
  buckets:
    - { age_min: 67, age_max: 74, survival: 0.982 }
    - { age_min: 75, age_max: 84, survival: 0.955 }
    - { age_min: 85, age_max: 95, survival: 0.88 }
    - { age_min: 96, age_max: 200, survival: 0.72 }

# --- Haertung 2: Demografiepfade
demography:
  mode: "constant"
  cohort_path: []

# --- Haertung 4: Alters-Einkommensprofile
income_profile:
  enabled: false

# --- Haertung 3: Staats-Backstop
backstop:
  enabled: true
  loan_cap_asset_share: 0.10
  repay_share: 0.50
  reserve_years: 3

# --- Haertung 5: Tontine-Longevity-Pool (aus Config E)
longevity:
  enabled: true
  floor: 10000
  max_age: 95
  surplus_share: 0.05
  tontine_enabled: true
  tontine_cap_multiple: 3.0

# --- Haertung 6: Symmetrische Reserve-Regel (aus Config E)
reserve_rule:
  enabled: true
  trigger_high: 0.03
  trigger_low: 0.01
  target_return: 0.02
  skim_fraction: 0.30
  inject_fraction: 0.30
  safe_rate: 0.005

# --- Haertung 7: RIG & Solidaritaets-Equity-Swap (Config F NEU)
#
# Der Solidarbeitrag der High-Gruppe wird transformiert:
#   8.00 pp (65%) -> Garantie-Pool (Versicherungspraemie, unwiderruflich)
#   4.25 pp (35%) -> RIG-Infrastruktur-Zertifikate (Sachwert-Beteiligung)
#
# RIG-Renditemodell:
#   r_RIG = base_return + beta * (r_mkt - base_return)
#   Bei r_mkt = -3%: r_RIG = 2% + 0.3*(-3%-2%) = 0.5% (Krisenschutz)
#   Bei r_mkt = +5%: r_RIG = 2% + 0.3*(5%-2%) = 2.9% (moderate Partizipation)
#
# Dividendenverteilung:
#   50% -> Garantie-Pool (automatischer Stabilisator)
#   50% -> Zertifikatshalter (Anreiz fuer High-Earner)
rig:
  enabled: true
  tau_insurance: 0.08       # 8 pp -> Garantie-Pool
  tau_equity: 0.0425        # 4.25 pp -> RIG-Zertifikate
  base_return: 0.02         # 2% reale Infrastrukturrendite
  beta: 0.30                # niedrige Marktsensitivitaet (dekorreliert)
  dividend_rate: 0.02       # 2% jaehrliche Dividendenrendite
  dividend_to_pool: 0.50    # 50% der Dividenden -> Garantie-Pool
