# --- Haertung 3: expliziter Staats-Backstop als Kreditlinie (kein Geschenk)
backstop:
  enabled: true
  # max. Kredit als Anteil am Systemvermoegen (Pool + LowAssets + MidAssets)
  loan_cap_asset_share: 0.10
  # Rueckzahlung: Anteil am Ueberschuss oberhalb Reserve
  repay_share: 0.50
  # Reserve: wie viele Jahre erwarteter Topups der Pool halten soll, bevor aggressiv getilgt wird
  reserve_years: 3

# --- Haertung 5: Longevity Pool (Post-Annuity Absicherung)
# Nach Ablauf der Annuitaet (Alter 87) erhalten Ueberlebende eine Mindestpension
# aus einem gemeinschaftlichen Longevity-Pool. Finanzierung:
#   1. Residual-Guthaben von Kohorten, deren Annuitaet auslaeuft
#   2. Anteil des Garantie-Pool-Ueberschusses (surplus_share)
#   3. Staats-Backstop als letzte Instanz
longevity:
  enabled: true
  # Mindestjaehrliche Pension nach Annuitaetsende (Grundsicherungsniveau, real EUR)
  floor: 10000
  # Maximalalter bis zu dem das Modell post-annuity Zahlungen leistet
  max_age: 95
  # Anteil des Garantie-Pool-Ueberschusses der in den Longevity-Pool umgeleitet wird
  # 0.05 ist der effizienteste Wert: longevity voll selbstfinanziert, minimaler tau_high Anstieg
  # (tau_high: 0.16 ohne -> 0.2175 mit longevity bei surplus_share=0.05)
  surplus_share: 0.05
