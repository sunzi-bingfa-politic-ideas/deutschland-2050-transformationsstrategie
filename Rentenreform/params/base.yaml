# Rentenreform/RSSP_v2/params/base.yaml

horizon_years: 100
age_start: 20
retire_age: 67
annuity_years: 20

# Population shares (of population at age_start each year)
low_share: 0.30
mid_share: 0.50
high_share: 0.20

# Incomes at retire-age (real, EUR/year).
# v2 keeps it simple & transparent. Later you can plug age-profiles / CSVs.
income_low_retire: 22000
income_mid_retire: 40000

# High income is defined relative to mid
high_income_factor: 1.8

# Contribution rates into individual accounts (Low/Mid only)
tau_low: 0.12
tau_mid: 0.13

# Guarantees (replacement vs income at retire-age)
guarantee_low: 1.00
guarantee_mid: 0.70

# IMPORTANT: High pays into pool, receives NO benefits.
# optimize.py will search tau_high (high_pool_rate)
tau_high_search:
  start: 0.01
  end: 0.25
  step: 0.0025

# Population at age_start each year (simplified constant cohort size)
# (You can later replace this with pop_by_age.csv + cohort stream)
cohort_size_at_age_start: 831435

# --- Haertung 1: Mortalitaet (minimal robust; spaeter durch Sterbetafel ersetzbar)
mortality:
  enabled: true
  buckets:
    - { age_min: 67, age_max: 74, survival: 0.99 }
    - { age_min: 75, age_max: 84, survival: 0.975 }
    - { age_min: 85, age_max: 95, survival: 0.95 }
    - { age_min: 96, age_max: 200, survival: 0.92 }

# --- Haertung 2: Demografiepfade
# constant: nutzt cohort_size_at_age_start
# path: nutzt cohort_path[t] (wenn kuerzer als horizon, letzter Wert wird fortgeschrieben)
demography:
  mode: "constant"   # constant | path
  # Beispiel-Pfad: "Deutschland schrumpft moderat"
  # Annahmen:
  #   - Jahre 0-20:  -0.5%/Jahr (demografische Traegheit)
  #   - Jahre 20-50: -0.8%/Jahr (Peak Alterung)
  #   - Jahre 50-80: -0.4%/Jahr (Stabilisierung)
  # Ergebnis: ~37% Rueckgang ueber 80 Jahre (831k -> 520k)
  cohort_path_moderate_shrink:
