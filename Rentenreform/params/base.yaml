# --- Haertung 4: Alters-Einkommensprofile
# Wenn enabled=true, werden Beitraege mit einem buckelfoermigen Multiplikator skaliert.
# Multiplikatoren sind Anteile des Einkommens bei Rentenalter (z.B. 0.40 bei Alter 20, 1.0 bei Peak).
# Wenn das Profil kuerzer als work_years ist, wird der letzte Wert wiederholt.
# Bei enabled=false (Standard): alle Arbeitsjahre verwenden das volle Rentenalter-Einkommen.
income_profile:
  enabled: false
  # Realistisches buckelfoermiges Profil fuer 47 Arbeitsjahre (Alter 20-66):
